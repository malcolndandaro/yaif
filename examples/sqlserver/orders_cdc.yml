# YAIF module: SQL Server CDC via Lakeflow Connect (managed connector)
#
# Verified end-to-end against SQL Server 2022: a CONTINUOUS gateway snapshots and
# captures changes (CDC / Change Tracking) into staging, and a TRIGGERED ingestion
# pipeline applies them into Unity Catalog tables.
#
# This file is OUTSIDE the bundle include glob (resources/*/*.yml) on purpose: the
# gateway needs a real UC SQLSERVER connection, so leaving it in the glob would block
# `databricks bundle deploy` of the demo until that connection exists. Activate it the
# same way you onboard an API domain:
#
#   1. Create the UC connection to your SQL Server (admin, one-time). Credentials live
#      in the connection — never in this file. Use a DEDICATED LEAST-PRIVILEGE login
#      (only the CT/CDC read grants the connector needs), never SA / db_owner:
#        CREATE CONNECTION sqlserver_conn TYPE SQLSERVER
#        OPTIONS (host '<host>', port '1433', user '<lfc_reader>', password '<password>',
#                 trustServerCertificate 'true');
#      (trustServerCertificate 'true' is LAB-ONLY — it skips server-cert validation.
#       For prod, drop it or pin the CA so the gateway verifies the server's TLS cert.)
#   2. Enable CDC or Change Tracking on the source database/tables (ask your DBA).
#   3. Set the variables in databricks.yml: `sqlserver_connection` and
#      `sqlserver_source_database`.
#   4. Move this file to resources/sqlserver/ (no databricks.yml edits — the target mode
#      sets each pipeline's `development` flag; see gotcha #1).
#   5. Deploy, start the CONTINUOUS gateway once, then run (and schedule) the ingestion job:
#        databricks bundle deploy
#        databricks bundle run sqlserver_gateway          # starts the continuous gateway
#        databricks bundle run sqlserver_ingestion_job    # triggers the ingestion apply
#
# No custom code — Lakeflow Connect is the managed framework; YAIF contributes only
# conventions (schema-per-module, naming, targets, monitoring).
#
# Flow:  gateway (CONTINUOUS: snapshot + change capture -> staging)
#          ->  ingestion (TRIGGERED: apply staged changes -> UC tables)
# The gateway -> ingestion staging Volume keeps change data ~30 days by default;
# reprocessing further back than that requires a resnapshot of the affected tables.
resources:
  schemas:
    sqlserver_schema:
      catalog_name: ${var.catalog}
      name: yaif_sqlserver
      comment: "YAIF SQL Server module — Lakeflow Connect CDC tables + gateway staging"

  pipelines:
    # Gateway: connects to SQL Server, snapshots tables and captures changes into
    # staging tables under the gateway storage schema. It MUST run CONTINUOUSLY —
    # Databricks docs: "You must run the gateway as a continuous pipeline." If it stops
    # long enough for the source's change log to truncate, the affected tables need a
    # full refresh. It bills classic-compute DBUs until stopped, so in a lab you can stop
    # it (`databricks pipelines stop <gateway-id>`); in prod, leave it running. The
    # scheduled job below triggers ONLY the ingestion pipeline, never this gateway.
    # Docs: https://docs.databricks.com/aws/en/ingestion/lakeflow-connect/sql-server-pipeline
    sqlserver_gateway:
      name: "[${bundle.target}] yaif-sqlserver-gateway"
      serverless: true
      continuous: true   # gateway runs continuously to stage change events (required)
      catalog: ${var.catalog}
      schema: ${resources.schemas.sqlserver_schema.name}
      gateway_definition:
        connection_name: ${var.sqlserver_connection}
        gateway_storage_catalog: ${var.catalog}
        gateway_storage_schema: ${resources.schemas.sqlserver_schema.name}
        gateway_storage_name: sqlserver_gateway_storage

    # Ingestion: reads the gateway's staging area and applies changes into UC
    # tables (SCD type 1 by default) in the destination schema. Lakeflow Connect
    # ingestion is TRIGGERED-only (continuous mode is rejected) — the scheduled job
    # below drives its cadence.
    sqlserver_ingestion:
      name: "[${bundle.target}] yaif-sqlserver"
      serverless: true
      continuous: false   # triggered; the job (or a pipeline schedule) sets the cadence
      catalog: ${var.catalog}
      schema: ${resources.schemas.sqlserver_schema.name}
      ingestion_definition:
        ingestion_gateway_id: ${resources.pipelines.sqlserver_gateway.id}
        objects:
          # One block per source table (example names — replace with yours):
          - table:
              source_catalog: ${var.sqlserver_source_database}
              source_schema: dbo
              source_table: Customers
              destination_catalog: ${var.catalog}
              destination_schema: ${resources.schemas.sqlserver_schema.name}
          - table:
              source_catalog: ${var.sqlserver_source_database}
              source_schema: dbo
              source_table: Orders
              destination_catalog: ${var.catalog}
              destination_schema: ${resources.schemas.sqlserver_schema.name}
          # Or ingest a whole schema in one block:
          # - schema:
          #     source_catalog: ${var.sqlserver_source_database}
          #     source_schema: dbo
          #     destination_catalog: ${var.catalog}
          #     destination_schema: ${resources.schemas.sqlserver_schema.name}
      notifications:
        - email_recipients:
            - ${workspace.current_user.userName}
          alerts:
            - on-update-failure
            - on-update-fatal-failure

    # --- Scaling past the per-pipeline table limit: shard across MULTIPLE PAIRS ---
    # Databricks recommends <= 250 tables per ingestion pipeline (this is the
    # feature-availability maximum too):
    #   https://docs.databricks.com/aws/en/ingestion/lakeflow-connect/sql-server-limits
    #   ("Databricks recommends ingesting 250 or fewer tables per pipeline.")
    #
    # A gateway and an ingestion pipeline are a PAIR — the ingestion pipeline points at
    # exactly one gateway via `ingestion_gateway_id`. To ingest more than ~250 tables you
    # add MORE PAIRS, each handling a subset under the limit, all publishing into the SAME
    # destination schema (yaif_sqlserver). The docs scale via separate gateway-ingestion
    # *pairs*; they do NOT document one gateway feeding several ingestion pipelines, so
    # give each ingestion pipeline its own gateway.
    #
    # Example: tables 1..250 go in the pair above; uncomment this second pair for 251..500
    # (note the distinct resource keys + a distinct `gateway_storage_name`):
    #
    # sqlserver_gateway_2:
    #   name: "[${bundle.target}] yaif-sqlserver-gateway-2"
    #   serverless: true
    #   continuous: true   # each pair's gateway runs continuously
    #   catalog: ${var.catalog}
    #   schema: ${resources.schemas.sqlserver_schema.name}
    #   gateway_definition:
    #     connection_name: ${var.sqlserver_connection}
    #     gateway_storage_catalog: ${var.catalog}
    #     gateway_storage_schema: ${resources.schemas.sqlserver_schema.name}
    #     gateway_storage_name: sqlserver_gateway_storage_2   # must differ from pair #1
    #
    # sqlserver_ingestion_2:
    #   name: "[${bundle.target}] yaif-sqlserver-2"
    #   serverless: true
    #   continuous: false   # triggered by the job
    #   catalog: ${var.catalog}
    #   schema: ${resources.schemas.sqlserver_schema.name}
    #   ingestion_definition:
    #     ingestion_gateway_id: ${resources.pipelines.sqlserver_gateway_2.id}   # this pair's gateway
    #     objects:
    #       # The NEXT subset of tables (keep each pipeline <= 250):
    #       - table:
    #           source_catalog: ${var.sqlserver_source_database}
    #           source_schema: dbo
    #           source_table: Invoices
    #           destination_catalog: ${var.catalog}
    #           destination_schema: ${resources.schemas.sqlserver_schema.name}
    #       - table:
    #           source_catalog: ${var.sqlserver_source_database}
    #           source_schema: dbo
    #           source_table: Shipments
    #           destination_catalog: ${var.catalog}
    #           destination_schema: ${resources.schemas.sqlserver_schema.name}
    #   notifications:
    #     - email_recipients:
    #         - ${workspace.current_user.userName}
    #       alerts:
    #         - on-update-failure
    #         - on-update-fatal-failure

  jobs:
    # Triggers ONLY the ingestion pipeline on a cadence — the repeatable "apply the
    # latest staged changes" unit. The gateway is CONTINUOUS (above) and is deliberately
    # NOT a job task: it captures into staging on its own; this job applies what's been
    # staged. This is the canonical Lakeflow Connect pattern (schedule the triggered
    # ingestion pipeline; never schedule the continuous gateway).
    # Docs: https://docs.databricks.com/aws/en/ingestion/lakeflow-connect/sql-server-pipeline
    sqlserver_ingestion_job:
      name: "[${bundle.target}] yaif-sqlserver"
      description: "SQL Server CDC: apply staged changes (ingestion pipeline) into UC"
      tasks:
        - task_key: ingest_apply
          pipeline_task:
            pipeline_id: ${resources.pipelines.sqlserver_ingestion.id}
        # When sharding (uncomment the second pair above), add its ingestion task here
        # too — each pair's gateway stays continuous and separate, so the job triggers
        # only the ingestion halves (they run in parallel):
        # - task_key: ingest_apply_2
        #   pipeline_task:
        #     pipeline_id: ${resources.pipelines.sqlserver_ingestion_2.id}
      queue:
        enabled: true
      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}
