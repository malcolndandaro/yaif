# Domain: blog  (GENERATED by scripts/generate_api_domains.py — do not hand-edit)
# Source of truth: the control-table rows where domain = 'blog'.
# Same shape as resources/api/content_domain.yml; the notebook + transformations are shared.
# To deploy: review this file, move it into resources/api/, then `databricks bundle deploy`.
# No databricks.yml edits needed: the target mode (development/production) sets each
# pipeline's `development` flag automatically — onboarding a domain is a pure file copy.
resources:
  schemas:
    blog_schema:
      catalog_name: ${var.catalog}
      name: yaif_blog
      comment: "YAIF API module — blog domain (bronze/silver/gold)"

  pipelines:
    blog_ingestion:
      name: "[${bundle.target}] yaif-api-blog"
      catalog: ${var.catalog}
      schema: ${resources.schemas.blog_schema.name}
      serverless: true
      photon: true
      libraries:
        - glob:
            include: ../../src/transformations/**
      configuration:
        landing_table: "${var.catalog}.${resources.schemas.blog_schema.name}.raw_api_responses"
      continuous: false
      notifications:
        - email_recipients:
            - ${workspace.current_user.userName}
          alerts:
            - on-update-failure
            - on-update-fatal-failure
      permissions:
        - level: CAN_VIEW
          group_name: ${var.viewers_group}

  jobs:
    blog_fetch_and_pipeline:
      name: "[${bundle.target}] yaif-api-blog"
      description: "blog domain: fetch APIs -> landing table -> SDP medallion"
      tasks:
        - task_key: fetch
          notebook_task:
            notebook_path: ../../src/jobs/fetch_api_responses.py
            base_parameters:
              api_connection: ${var.api_connection}
              api_endpoints: "/posts,/comments?postId=1"
              landing_table: "${var.catalog}.${resources.schemas.blog_schema.name}.raw_api_responses"
              request_concurrency: ${var.request_concurrency}
          environment_key: fetch_env
          # Retry infra-level failures (e.g. environment build) and bound runtime — the
          # in-code tenacity retries only cover HTTP calls, not task setup.
          max_retries: 2
          timeout_seconds: 3600
        - task_key: run_pipeline
          depends_on:
            - task_key: fetch
          pipeline_task:
            pipeline_id: ${resources.pipelines.blog_ingestion.id}
      environments:
        - environment_key: fetch_env
          spec:
            client: "2"
            dependencies:
              - "tenacity>=8.2.0"
              # Floor must exceed the serverless-preinstalled SDK, or pip skips the
              # upgrade and serving_endpoints.http_request() doesn't exist.
              - "databricks-sdk>=0.50.0"
      schedule:
        quartz_cron_expression: "0 0 */4 * * ?"
        timezone_id: "UTC"
      queue:
        enabled: true
      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}
      permissions:
        - level: CAN_VIEW
          group_name: ${var.viewers_group}
