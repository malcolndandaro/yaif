bundle:
  name: yaif

include:
  - resources/*/*.yml

variables:
  catalog:
    description: "Unity Catalog for all domain schemas (must exist; schemas are created by the bundle)"
    # Sandbox workspace (sqlserver-ws / dbc-f9cc83ac-844b) is this repo's test bed; its catalog is 'yaif'.
    default: "yaif"
  api_connection:
    description: "UC HTTP connection holding host, base path, and credential (auth_mode=connection domains)"
    default: "yaif_demo_api"
  # --- basic_secret auth (auth_mode=basic_secret domains: direct requests + UC secret scope) ---
  # Generic placeholders for generated/basic_secret API domains. Override per domain or globally.
  # A UC HTTP connection CANNOT carry clean Basic auth (gotcha #9), so Basic-auth APIs use these.
  api_base_url:
    description: "Scheme+host for basic_secret API domains, e.g. https://host (no trailing path). Placeholder — set before activating a basic_secret domain."
    default: "https://REPLACE-ME.example.com"
  api_secret_scope:
    description: "UC secret scope holding username/password for basic_secret API domains."
    default: "yaif_api"
  # --- Oracle EPM template (examples/api/epm_domain.yml) — CUSTOMER-RUN-ONLY, used only once activated ---
  epm_host:
    description: "Oracle EPM host for the CUSTOMER-RUN-ONLY epm_domain template. NEVER a real host in-repo — placeholder default. Set in the customer workspace."
    default: "https://REPLACE-ME.example.com"
  epm_secret_scope:
    description: "Customer-managed UC secret scope with EPM username/password (epm_username/epm_password). Customer-populated only."
    default: "epm_secrets"
  request_concurrency:
    description: "Concurrent HTTP requests per domain job (sum across overlapping jobs must respect the gateway rate limit)"
    default: "8"
  viewers_group:
    description: "Workspace group granted CAN_VIEW on every domain's pipeline + job. Default 'users' (all workspace users) suits a demo; for the per-team governance story, override globally here, per target, or per-domain (set a domain's own team group in its resources/*/*.yml)."
    default: "users"
  # --- files module (Auto Loader) — used only once examples/files/*.yml is activated ---
  files_source_uri:
    description: "Object-storage path the connector writes Parquet to; a UC external location must already cover it. s3://… | abfss://… | gs://…"
    default: "s3://your-bucket/erp/"
  file_format:
    description: "Auto Loader source format for the files module (parquet | csv | json | avro)"
    default: "parquet"
  # --- SQL Server module — used only once examples/sqlserver/*.yml is activated ---
  sqlserver_connection:
    description: "Name of the UC SQLSERVER connection Lakeflow Connect uses (created out-of-band)"
    default: "sqlserver_conn"
  sqlserver_source_database:
    description: "Source SQL Server database name to ingest from (the connector's source_catalog)"
    default: "your_source_db"

targets:
  # mode: development / mode: production set every pipeline's `development` flag per
  # target automatically (dev -> true, prod -> validated false) and pause/enable
  # schedules accordingly — so there are NO per-pipeline `development:` overrides here.
  # Onboarding a domain is a pure file copy into resources/*/*.yml with zero databricks.yml churn.
  #
  # Both targets point at the SANDBOX workspace (profile `sqlserver-ws` =
  # https://dbc-f9cc83ac-844b.cloud.databricks.com, catalog `yaif`) — this repo's
  # everything-on-the-sandbox test bed. The SQL Server Lakeflow gateway also lives in
  # this workspace (deployed out-of-band; kept as examples/, not in the deploy glob).
  # Override per command with `--profile <name>` to target a different workspace.
  dev:
    default: true
    mode: development
    workspace:
      profile: sqlserver-ws

  prod:
    mode: production
    workspace:
      profile: sqlserver-ws
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      request_concurrency: "32"
    permissions:
      - level: CAN_VIEW
        group_name: ${var.viewers_group}
